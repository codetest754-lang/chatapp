metadata: { name: user-service, namespace: chatapp }
spec: { replicas: 4, selector: { matchLabels: { app: user-service } }, template: { metadata: { labels: { app: user-service } }, spec: { containers: [{ name: user-service, image: chatapp/user-service:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: chat-service, namespace: chatapp }
spec: { replicas: 10, selector: { matchLabels: { app: chat-service } }, template: { metadata: { labels: { app: chat-service } }, spec: { containers: [{ name: chat-service, image: chatapp/chat-service:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: group-service, namespace: chatapp }
spec: { replicas: 4, selector: { matchLabels: { app: group-service } }, template: { metadata: { labels: { app: group-service } }, spec: { containers: [{ name: group-service, image: chatapp/group-service:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: media-service, namespace: chatapp }
spec: { replicas: 6, selector: { matchLabels: { app: media-service } }, template: { metadata: { labels: { app: media-service } }, spec: { containers: [{ name: media-service, image: chatapp/media-service:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: call-service, namespace: chatapp }
spec: { replicas: 6, selector: { matchLabels: { app: call-service } }, template: { metadata: { labels: { app: call-service } }, spec: { containers: [{ name: call-service, image: chatapp/call-service:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: notification-service, namespace: chatapp }
spec: { replicas: 4, selector: { matchLabels: { app: notification-service } }, template: { metadata: { labels: { app: notification-service } }, spec: { containers: [{ name: notification-service, image: chatapp/notification-service:latest, ports: [{ containerPort: 8080 }] }] } } }
