apiVersion: v1
kind: Namespace
metadata:
  name: chatapp
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: gateway-api, namespace: chatapp }
spec: { replicas: 6, selector: { matchLabels: { app: gateway-api } }, template: { metadata: { labels: { app: gateway-api } }, spec: { containers: [{ name: gateway-api, image: chatapp/gateway-api:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: auth-service, namespace: chatapp }
spec: { replicas: 4, selector: { matchLabels: { app: auth-service } }, template: { metadata: { labels: { app: auth-service } }, spec: { containers: [{ name: auth-service, image: chatapp/auth-service:latest, ports: [{ containerPort: 8080 }] }] } } }
---
apiVersion: apps/v1
