metadata: { name: presence-service, namespace: chatapp }
spec: { replicas: 8, selector: { matchLabels: { app: presence-service } }, template: { metadata: { labels: { app: presence-service } }, spec: { containers: [{ name: presence-service, image: chatapp/presence-service:latest, ports: [{ containerPort: 8080 }] }] } } }
